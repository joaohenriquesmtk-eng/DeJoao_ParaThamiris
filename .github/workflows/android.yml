name: Build Android
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar Dependencias do Projeto
        run: npm install
        
      - name: Sincronizar Capacitor
        run: npx cap sync android
        
      - name: Fabricar o APK (Android)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Entregar o Presente (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-android
          path: android/app/build/outputs/apk/debug/app-debug.apk