name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Garantir a Identidade do Projeto
        run: |
          npm install
          npm install @capacitor/ios @capacitor/core @capacitor/cli
          # Passo 1: Limpamos qualquer resquicio de configuracao antiga para evitar conflitos
          rm -f capacitor.config.json capacitor.config.ts
          # Passo 2: Inicializamos o projeto de forma limpa
          npx cap init Santuario com.joaoethamiris.santuario --web-dir www
          
      - name: Criar a pasta Web (O Passo Mágico)
        run: |
          # Passo 3: O Capacitor precisa que a pasta web exista ANTES de criar o iOS!
          # Se o seu projeto não tem um comando de build (como npm run build),
          # nós criamos a pasta www e um ficheiro index.html básico manualmente.
          mkdir -p www
          echo "<html><head><title>Santuário</title></head><body><h1>Santuário App</h1></body></html>" > www/index.html
          
      - name: Fabricar a Plataforma iOS do Zero Absoluto
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: Construir as Fundacoes da Apple (CocoaPods)
        run: |
          cd ios/App
          pod install --repo-update
          
      - name: Fabricar o App no Mac Virtual
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          
      - name: Criar o IPA Especial (Sideloading)
        run: |
          cd ios/App/build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar o Presente (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa