<div class="top-bar" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.4); z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 10px 8px;">
        
        <div class="top-bar-left" style="display: flex; gap: 5px; align-items: center;">
            <button class="btn-voltar" onclick="voltarMenuJogos()" style="padding: 6px 10px; font-size: 0.85rem;">← Voltar</button>
            <button class="btn-info" onclick="toggleInstrucoesTermo()" style="padding: 6px 10px; font-size: 0.85rem;">❓</button>
        </div>
        
        <div class="top-bar-right" style="display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: nowrap;">
            <span class="recurso" style="padding: 4px 8px; font-size: 0.8rem; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); color: #D4AF37; white-space: nowrap;">🔑 Cofre</span>

            <div class="visor-moedas-global-container" style="padding: 4px 10px; font-size: 0.85rem;">
                <span class="visor-moedas-global-texto">0</span>
                <span style="font-size: 0.8rem;">💰</span>
            </div>
        </div>
    </div>

    <div class="conteudo-termo">
        <div id="instrucoes-termo" class="escondido cartao-instrucoes" style="border-left: 5px solid #D4AF37;">
            <h4 style="color: #D4AF37;">🔮 O Oráculo de Cristal</h4>
            <p>Adivinhe a palavra secreta de 5 letras para destrancar o Cofre de Relíquias.</p>
            <ul style="font-size: 0.85rem; margin-top: 10px;">
                <li><span style="color: #2ecc71; font-weight: bold;">VERDE:</span> Letra certa no lugar certo.</li>
                <li><span style="color: #f39c12; font-weight: bold;">OURO:</span> Letra certa no lugar errado.</li>
                <li><span style="color: #555; font-weight: bold;">ESCURO:</span> A letra não existe na palavra.</li>
            </ul>
        </div>

        <div class="oraculo-pedestal">
            <div id="oraculo-3d" style="width: 100%; height: 100%; z-index: 5;"></div>
            <div class="brilho-oraculo"></div>
        </div>

        <div id="grade-termo" class="grade-oraculo">
            </div>

        <div id="teclado-termo" class="teclado-oraculo">
            </div>

        <div style="margin-top: 20px; display: flex; gap: 15px; width: 100%; max-width: 400px;">
            <button id="btn-verificar" class="btn-acao btn-verificar-oraculo" onclick="verificarPalavra()">Revelar Destino ✨</button>
        </div>

        <div id="termo-reset-container" class="escondido" style="margin-top: 15px; width: 100%; max-width: 400px;">
            <button class="btn-acao" onclick="resetarTermo()" style="background: linear-gradient(145deg, #e74c3c, #c0392b); box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); width: 100%;">↻ Tentar Novamente</button>
        </div>
        
        <div style="margin-top: 15px; display: flex; width: 100%; max-width: 400px; justify-content: center;">
            <button class="btn-acao" onclick="usarDicaAmor()" style="width: 100%; background: linear-gradient(145deg, #9b59b6, #8e44ad); color: white; border: 1px solid #d35400; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4); padding: 12px; font-weight: bold; font-size: 1rem; border-radius: 15px;">
                💡 Comprar Dica do Coração (10💰)
            </button>
        </div>
    </div>
</div>
