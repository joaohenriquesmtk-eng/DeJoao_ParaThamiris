name: Build iOS
on:
  push:
    branches: [ main ]

# ------------------------------------------------------------------
# O SEGREDO: Desligamos qualquer pergunta ou interrupção do Capacitor
# ------------------------------------------------------------------
env:
  CI: true
  CAPACITOR_DISABLE_TELEMETRY: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Preparar o Terreno (Garantia Absoluta)
        run: |
          # Garantimos que a pasta www exista perfeitamente na nuvem
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          
          # Criamos a certidão de nascimento do aplicativo à força
          echo '{
            "appId": "com.joaoethamiris.santuario",
            "appName": "Santuario",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json

      - name: Instalar o Capacitor
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
      - name: Fabricar a Plataforma iOS 
        run: |
          # Agora o Capacitor vai trabalhar calado, do início ao fim!
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Verificacao de Seguranca (A Prova do Crime)
        run: |
          # Isso vai imprimir na tela do GitHub se o Podfile finalmente nasceu
          ls -la ios/App/Podfile || echo "Alerta: Podfile ainda sumido!"

      - name: Instalar as Fundacoes da Apple (CocoaPods)
        run: |
          cd ios/App
          pod install --repo-update
          
      - name: Fabricar o App no Mac Virtual
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          
      - name: Criar o IPA Especial (Sideloading)
        run: |
          cd ios/App/build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar o Presente Final
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa