<div class="pager-fundo" style="display: flex; flex-direction: column; height: 100%; color: white; padding: 0; box-sizing: border-box; overflow: hidden;">
    
    <div class="pager-grade"></div>

    <div class="top-bar" style="background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(138, 180, 248, 0.15); z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; position: relative;">
        <button onclick="window.sairDoPager()" style="background: none; border: none; color: #8ab4f8; font-size: 0.95rem; font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: all 0.3s; background: rgba(138, 180, 248, 0.05);">
            <span style="margin-right: 5px;">←</span> Sair
        </button>
        
        <span style="color: #8ab4f8; font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 15px rgba(138, 180, 248, 0.5); text-transform: uppercase;">Freq. 143.4 MHz</span>

        <div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <div id="indicador-satelite-pager" style="width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: pulse-gold 2s infinite alternate;" title="Satélite Conectado"></div>
        </div>
    </div>

    <div style="padding: 30px 20px; display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; z-index: 10;">
        
        <div class="pager-visor" style="width: 100%; max-width: 400px; margin-bottom: 50px;">
            <p style="color: #666; font-family: monospace; font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase;">Status do Canal</p>
            <h2 id="pager-status-texto" style="color: #8ab4f8; font-family: monospace; font-size: 1.4rem; font-weight: bold; margin: 0; text-shadow: 0 0 10px rgba(138, 180, 248, 0.8); letter-spacing: 1px; min-height: 35px; display: flex; align-items: center; justify-content: center;">
                SINAL LIVRE
            </h2>
            
            <div style="display: flex; justify-content: center; gap: 5px; margin-top: 20px; height: 30px; align-items: flex-end;" id="pager-ondas-visuais">
                </div>
        </div>

        <div style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%;">
            <div id="btn-ptt-mestre" class="pager-btn-ptt" 
                 onpointerdown="window.iniciarGravacaoPTT(event)" 
                 onpointerup="window.pararGravacaoPTT(event)" 
                 onpointerleave="window.pararGravacaoPTT(event)"
                 oncontextmenu="event.preventDefault(); return false;">
                
                <div class="onda-radio"></div>
                <div class="onda-radio"></div>
                <div class="onda-radio"></div>
                
                <div class="pager-btn-nucleo">
                    <span id="icone-mic-ptt" style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(138, 180, 248, 0.5)); transition: all 0.3s;">🎙️</span>
                    <span id="texto-btn-ptt" style="color: #8ab4f8; font-family: monospace; font-weight: bold; letter-spacing: 2px; margin-top: 10px; font-size: 0.85rem; transition: all 0.3s;">SEGURE</span>
                </div>
            </div>
        </div>
        
        <p style="color: #555; font-family: monospace; font-size: 0.75rem; margin-top: 40px; letter-spacing: 1px; text-align: center;">
            A transmissão corta o silêncio automaticamente no destino.
        </p>
    </div>
</div>
