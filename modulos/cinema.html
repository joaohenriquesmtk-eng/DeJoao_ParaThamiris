<div style="display: flex; flex-direction: column; height: 100%; background: radial-gradient(circle at 50% 30%, #150a12 0%, #030305 70%, #000000 100%); color: white; padding: 0; box-sizing: border-box; overflow: hidden; position: relative;">
    
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(212,175,55,0.05) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; z-index: 0;"></div>

    <div class="top-bar" style="background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 100%); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; position: relative;">
        <button onclick="window.sairDoCinema()" style="background: none; border: none; color: #aaa; font-size: 0.95rem; font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: all 0.3s; background: rgba(255,255,255,0.05);">
            <span style="margin-right: 5px;">←</span> Sair
        </button>
        
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="color: var(--cor-primaria); font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 15px rgba(212,175,55,0.5);">Cine Quântico</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <span style="font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px;">Sinal</span>
            <div id="indicador-sync-cinema" style="width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; box-shadow: 0 0 10px #e74c3c; transition: all 0.5s ease;" title="Aguardando Satélite"></div>
        </div>
    </div>

    <div style="padding: 25px 20px; display: flex; flex-direction: column; flex: 1; position: relative; z-index: 10; overflow-y: auto; overflow-x: hidden;">
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;">
            
            <div class="cinema-input-glass" style="margin: 0; padding: 12px 20px;">
                <div style="display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--cor-primaria); margin-right: 12px;">🔗</div>
                <input type="text" id="cinema-url-input" placeholder="Cole o link mágico do YouTube aqui..." style="flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 0.95rem; font-family: monospace;">
            </div>

            <button onclick="window.carregarNovoVideoCinema()" class="btn-acao" style="width: 100%; padding: 14px; font-size: 1rem; border-radius: 20px; background: linear-gradient(145deg, #D4AF37, #b5952f); color: #000; box-shadow: 0 8px 20px rgba(212,175,55,0.3); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin: 0; border: 1px solid #ffdf70;">
                Projetar Vídeo
            </button>
            
        </div>

        <div class="cinema-tela-moldura">
            <div id="youtube-player-container" style="width: 100%; height: 100%; border-radius: 15px; overflow: hidden; position: relative; z-index: 2;"></div>
            
            <div id="cinema-overlay" class="escondido" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; border-radius: 15px;">
                
                <div style="font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));">🎫</div>
                <h3 style="font-family: 'Playfair Display', serif; color: #fff; font-size: 1.4rem; margin: 0 0 5px 0;">Sessão Particular</h3>
                <p style="font-family: monospace; color: #aaa; margin-bottom: 20px; font-size: 0.85rem; letter-spacing: 1px;">Ingresso enviado por <span id="cinema-autor-texto" style="font-weight: bold; color: var(--cor-primaria); font-size: 1rem; text-shadow: 0 0 10px rgba(212,175,55,0.5);"></span></p>
                
                <button onclick="window.entrarNaSessaoCinema()" class="btn-acao" style="padding: 12px 35px; font-size: 1.1rem; border-radius: 30px; background: rgba(212, 175, 55, 0.15); border: 1px solid var(--cor-primaria); color: var(--cor-primaria); box-shadow: 0 0 25px rgba(212,175,55,0.3); transition: all 0.3s ease;">
                    Aceitar Convite ▶
                </button>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; padding-top: 40px; padding-bottom: 20px;">
            
            <p style="font-size: 0.75rem; color: #666; font-family: monospace; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;">Telemetria Emocional</p>
            
            <div class="cinema-btn-coracao" onclick="window.enviarReacaoCinema()" onmousedown="if(window.Haptics) navigator.vibrate(20);" ontouchstart="if(window.Haptics) navigator.vibrate(20);">
                <span style="filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));">❤️</span>
            </div>
            
            <div id="reacoes-voadores-container" style="position: absolute; bottom: 60px; width: 100%; height: 350px; pointer-events: none; display: flex; justify-content: center; z-index: 0;"></div>
        </div>
        
    </div>
</div>
