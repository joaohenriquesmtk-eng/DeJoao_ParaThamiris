<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De João, Para Thamiris ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Canvas para confete -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Índice -->
  <div class="index-container" id="indexContainer">
    <div class="index-title">Escolha um capítulo da nossa história</div>
    <div class="index-buttons-grid">
      <!-- Botões serão inseridos aqui pelo JS -->
    </div>
  </div>

  <!-- Barra de progresso da música -->
  <div id="player-bar" class="player-bar hidden">
    <button id="play-pause-btn" aria-label="Play/Pause">▶</button>
    <input id="music-progress" type="range" min="0" max="100" value="0" step="0.1">
    <span id="current-time">0:00</span> / <span id="duration">0:00</span>
  </div>

  <!-- Modal da carta -->
  <div id="letter-modal" class="letter-modal hidden">
    <div class="letter-overlay"></div>
    <div class="letter-card">
      <button id="close-letter" class="close-btn" aria-label="Fechar carta">×</button>
      <div class="letter-paper">
        <div id="letter-content"></div>
      </div>
    </div>
  </div>

  <!-- Intro do jogo -->
  <div class="game-start-screen" id="gameStartScreen">
    <div class="start-panel">
      <h1>Nosso Mundo</h1>
      <p>Clique para começar nossa jornada</p>
      <button id="start-game-btn">Começar</button>
    </div>
  </div>

  <!-- Container principal do jogo -->
  <div class="game-wrapper hidden" id="gameWrapper">
    <div class="hud-bar" id="hudBar">
      <div class="hud-left">
        <div class="hud-title">De João, Para Thamiris</div>
      </div>
      <div class="hud-right">
        <button id="openMapBtn" class="hud-btn">Mapa</button>
        <button id="openInventoryBtn" class="hud-btn">Inventário</button>
      </div>
    </div>

    <div class="game-shell">
      <div class="game-container" id="gameContainer">
        <div class="room" id="room"></div>
        <div class="player" id="player"></div>
      </div>
    </div>
  </div>

  <!-- Overlay de dica -->
  <div id="hint-overlay" class="hint-overlay hidden">
    <div class="hint-box">
      <div id="hint-text"></div>
      <button id="close-hint">Entendi</button>
    </div>
  </div>

  <!-- Modal do mapa -->
  <div id="map-modal" class="map-modal hidden">
    <div class="map-overlay"></div>
    <div class="map-card">
      <button id="close-map" class="close-btn" aria-label="Fechar mapa">×</button>
      <div id="map-grid" class="map-grid"></div>
    </div>
  </div>

  <!-- Modal do inventário -->
  <div id="inventory-modal" class="inventory-modal hidden">
    <div class="inventory-overlay"></div>
    <div class="inventory-card">
      <button id="close-inventory" class="close-btn" aria-label="Fechar inventário">×</button>
      <h2>Inventário</h2>
      <div id="inventory-grid" class="inventory-grid"></div>
    </div>
  </div>

  <!-- Modal das cartas colecionáveis -->
  <div id="cards-modal" class="cards-modal hidden">
    <div class="cards-overlay"></div>
    <div class="cards-card">
      <button id="close-cards" class="close-btn" aria-label="Fechar cartas">×</button>
      <h2>Cartas</h2>
      <div id="cards-grid" class="cards-grid"></div>
    </div>
  </div>

  <!-- Modal da loja -->
  <div id="shop-modal" class="shop-modal hidden">
    <div class="shop-overlay"></div>
    <div class="shop-card">
      <button id="close-shop" class="close-btn" aria-label="Fechar loja">×</button>
      <h2>Loja</h2>
      <div id="shop-grid" class="shop-grid"></div>
    </div>
  </div>

  <!-- Modal do álbum -->
  <div id="album-modal" class="album-modal hidden">
    <div class="album-overlay"></div>
    <div class="album-card">
      <button id="close-album" class="close-btn" aria-label="Fechar álbum">×</button>
      <h2>Álbum</h2>
      <div id="album-grid" class="album-grid"></div>
    </div>
  </div>

  <div class="fio-de-ouro"></div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="./wrapped.js"></script>
  <script src="./app.js"></script>
</body>
</html>
