name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Forcar Instalacao do Motor iOS
        run: |
          npm install
          npm install @capacitor/ios @capacitor/core @capacitor/cli --save
          
      - name: Recriar a Plataforma iOS do Zero
        run: |
          rm -rf ios
          npx cap add ios
          
      - name: Sincronizar e Criar Arquivos Nativos
        run: npx cap sync ios
          
      - name: Construir as Fundacoes da Apple (CocoaPods)
        run: |
          cd ios/App
          pod install --repo-update
          
      - name: Fabricar o App no Mac Virtual
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          
      - name: Criar o IPA Especial (Sideloading)
        run: |
          cd ios/App/build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar o Presente (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa