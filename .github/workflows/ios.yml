name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalacao de Dependencias
        run: |
          npm install
          npm install @capacitor/ios @capacitor/core @capacitor/cli
          
      - name: Vigia de Arquivos (Debug)
        run: |
          echo "--- Verificando Raiz ---"
          ls -F
          echo "--- Verificando pasta WWW ---"
          mkdir -p www
          ls -F www/
          
      - name: Reconstruir Configuracao
        run: |
          rm -f capacitor.config.json
          echo '{
            "appId": "com.joaoethamiris.santuario",
            "appName": "Santuario",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json

      - name: Gerar Plataforma iOS Nativa
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: Validar Nascimento do Podfile
        run: |
          if [ -f "ios/App/Podfile" ]; then
            echo "✅ Podfile encontrado com sucesso!"
          else
            echo "❌ ERRO: O Capacitor falhou em criar o projeto iOS."
            exit 1
          fi

      - name: Instalar CocoaPods
        run: |
          cd ios/App
          pod install --repo-update
          
      - name: Compilar IPA para Thamiris
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          cd build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar Arquivo IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa