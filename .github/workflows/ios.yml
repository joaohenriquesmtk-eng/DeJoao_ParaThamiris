name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Limpeza e Preparação de Emergência
        run: |
          # 1. Limpamos qualquer pasta residual que possa travar o processo
          rm -rf ios www node_modules package-lock.json
          
          # 2. Criamos a pasta WWW e movemos os arquivos para o lugar que o Capacitor AMA
          mkdir -p www
          # Copiamos tudo que é vital para o funcionamento do PWA
          cp index.html www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          
          # 3. Instalamos o motor do Capacitor do zero na nuvem
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Inicialização Forçada do App
        run: |
          # Criamos a configuração na hora, sem depender de arquivos do Windows
          npx cap init Santuario com.joaoethamiris.santuario --web-dir www
          
          # COMANDO CRÍTICO: Adicionamos o iOS de forma que ele OBRIGATORIAMENTE crie o projeto
          npx cap add ios
          npx cap sync ios

      - name: O Teste da Verdade (Vigia de Podfile)
        run: |
          if [ -f "ios/App/Podfile" ]; then
            echo "✅ FINALMENTE! O Podfile nasceu."
          else
            echo "❌ INFERNO! O Podfile ainda não existe. Listando pastas para investigação:"
            ls -R ios
            exit 1
          fi

      - name: Instalar CocoaPods e Compilar
        run: |
          cd ios/App
          pod install --repo-update
          
          # Compilação silenciosa para evitar logs gigantes
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          
      - name: Gerar IPA para Thamiris
        run: |
          cd ios/App/build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar IPA Final
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa