name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalacao de Ferramentas
        run: |
          npm install
          npm install @capacitor/ios @capacitor/core @capacitor/cli
          
      - name: Organizacao da Pasta WWW
        run: |
          # Criamos a pasta e garantimos o index.html nela
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          
      - name: Reset de Configuracao
        run: |
          rm -f capacitor.config.json
          echo '{
            "appId": "com.joaoethamiris.santuario",
            "appName": "Santuario",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json

      - name: Gerar Projeto iOS
        run: |
          rm -rf ios
          # Removido o --verbose que causou o erro anterior
          npx cap add ios
          npx cap sync ios
          
      - name: Instalar CocoaPods
        run: |
          cd ios/App
          pod install --repo-update
          
      - name: Fabricar o App (IPA)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath build/App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE=""
          cd build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Entregar IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-santuario-ios
          path: ios/App/build/App.xcarchive/Products/Applications/app.ipa